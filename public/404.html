<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phantom — 404</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Space+Mono&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080810;
      color: #f0eeff;
      font-family: 'Syne', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .box { text-align: center; padding: 40px; }
    .ghost { font-size: 56px; margin-bottom: 12px; animation: float 3s ease-in-out infinite; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-10px); }
    }
    h1 {
      font-size: 80px;
      font-weight: 800;
      background: linear-gradient(135deg, #a78bfa, #ff5faa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    p {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      color: rgba(240, 238, 255, 0.4);
      margin-top: 16px;
    }
    a {
      display: inline-block;
      margin-top: 28px;
      color: #a78bfa;
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="box">
    <div class="ghost">👻</div>
    <h1>404</h1>
    <p>This page doesn't exist on our server.</p>
    <a href="/">← Back to Phantom</a>
  </div>
</body>
</html>
